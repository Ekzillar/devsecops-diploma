name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run Bandit SAST
        run: |
          pip install bandit
          bandit -r flaskr -f json -o bandit-report.json

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devsecops-diploma:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop flaskr || true
            docker rm flaskr || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-diploma:latest
            docker run -d --name flaskr -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/devsecops-diploma:latest

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  dast:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP ZAP DAST
        run: |
          mkdir -p zap_output && chmod 777 zap_output
          docker run --rm --user root -v $(pwd)/zap_output:/zap/wrk:rw -w /zap/wrk -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://${{ secrets.SERVER_HOST }}:5000 -r dast_report.html || true
          cp zap_output/dast_report.html ./

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: dast_report.html

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/path zricethezav/gitleaks:latest detect \
            --source="/path" \
            --report-format=json \
            --report-path="/path/gitleaks-report.json" \
            --verbose
        continue-on-error: true

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  trivy:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-diploma:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  comment-pr:
    if: github.event_name == 'pull_request'
    needs: [test-and-build, dast, gitleaks, trivy]
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const artifactsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Security pipeline completed\n\n` +
                    `- [SAST Bandit report](${artifactsUrl})\n` +
                    `- [DAST OWASP ZAP report](${artifactsUrl})\n` +
                    `- [Gitleaks secrets report](${artifactsUrl})\n` +
                    `- [Trivy image scan report](${artifactsUrl})\n\n` +
                    `_Click on the links to download the artifacts._`
            });
